<html>
    <head>
        <title>Font Tag & its attributes</title>
    </head>
    <body>
        <font face="copperplate gothic" size="7" color="red">
            This is a red Copperplate Gothic text of size 7
        </font><br><br>
        <font face="comic sans ms" size="5" color="blue">
            This is a blue Comic Sans MS text of size 5
        </font><br><br>
        <font face="algerian" size="1" color="purple">
            This is a purple Algerian text of size 1
        </font><br><br>
        <font face="cambria math" color="yellow">
            <p>
                Font Tag's size attribute takes values between 1 & 7 with default 3.
                While face and color attributes define font-family and text-color respectively.
            </p>
        </font>
    </body>
</html>
