<!DOCTYPE html>
<html>
    <head>
        <title>Half Pyramid of Asterisks</title>
        <script>
            num = prompt("Enter number of rows:")
            for(i=1;i<=num;i++){
                for(j=1;j<=i;j++){
                    document.write("* ")         
                }
                document.write("<br>")
            }
        </script>
    </head>
</html>
