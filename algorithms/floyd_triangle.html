<!DOCTYPE html>
<html>
    <head>
        <title>Floyd's Triangle</title>
        <script>
            num = prompt("Enter number of rows:")
            count = 1
            for(i=1;i<=num;i++){
                for(j=1;j<=i;j++){
                    document.write(count+"&ensp;")
                    count++    
                }
                document.write("<br>")
            }
        </script>
    </head>
</html>
