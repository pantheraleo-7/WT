<html>
    <head>
        <title>Sum of Digits</title>
    </head>
    <body>
        <button type="button" onclick="calc()">Calculate</button>
        <script>
            function calc(){
				n = prompt("Enter a whole number")
				sum = 0
                for(i=0;i<n.length;i++){
                    sum += parseInt(n.charAt(i))
                }
                alert("Sum of digits of "+n+" = "+sum)
            }
        </script>
    </body>
</html>
