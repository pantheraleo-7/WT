<!DOCTYPE html>
<html>
    <head>
        <title>Full Pyramid of Asterisks</title>
        <script>
            num = parseInt(prompt("Enter number of rows:"))
            lim = 2*num-1
            for(i=0;i<num;i++){
                for(k=1;k<=lim;k++){
                    if(k<num-i || k>num+i){
                        document.write("&emsp;")
                    }
                    else{
                        document.write("&nbsp;*&nbsp;")
                    }
                }
                document.write("<br>")
            }
        </script>
    </head>
</html>
