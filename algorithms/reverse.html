<html>
    <head>
        <title>Reverse</title>
    </head>
    <body>
        <button type="button" onclick="rev()">Reverse</button>
        <script>
            function rev(){
				n = prompt("Enter:")
				str = n.split("").reverse().join("")
				alert("Reverse of "+n+" is "+str)
            }
        </script>
    </body>
</html>
