<!doctype html>
<html>
    <head>
        <title>Leap Year</title>
    </head>
    <body>
        <button type="button" onclick="check()">Check</button>
        <script>
            function check(){
                n = prompt("Enter year:")
                if(n%4==0){
                    alert(n+" is a leap year")
                }
                else{
                    alert(n+" is not a leap year")
                }
            }
        </script>
    </body>
</html>
