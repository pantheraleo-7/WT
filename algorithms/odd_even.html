<!doctype html>
<html>
    <head>
        <title>Odd-Even Check</title>
    </head>
    <body>
        <button type="button" onclick="check()">Check</button>
        <script>
            function check(){
                n = prompt("Enter an integer:")
                if(n%2==0){
                    alert(n+" is an even number")
                }
                else{
                    alert(n+" is an odd number")
                }
            }
        </script>
    </body>
</html>
