<!DOCTYPE html>
<html>
    <head>
        <title>Conditional Statements</title>
    </head>
    <body>
        <button type="button" onclick="check()">Check</button>
        <script>
            function check(){
                x = prompt("Enter a number:")
                if(x>100){
                    alert(x+" is greater than 100")
                }
                else if(x<100){
                    alert(x+" is lesser than 100")
                }
                else{
                    alert("100 is equal to 100")
                }
            }
        </script>
    </head>
</html>
