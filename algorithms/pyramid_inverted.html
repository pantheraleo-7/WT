<!DOCTYPE html>
<html>
    <head>
        <title>Inverted Full Pyramid of Asterisks</title>
        <script>
            num = parseInt(prompt("Enter number of rows:"))
            lim = 2*num-1
            for(i=num-1;i>=0;i--){
                for(k=lim;k>=1;k--){
                    if(k<num-i || k>num+i){
                        document.write("&emsp;")
                    }
                    else{
                        document.write("&nbsp;*&nbsp;")
                    }
                }
                document.write("<br>")
            }
        </script>
    </head>
</html>
