<!doctype html>
<html>
    <head>
        <title>Prime Numbers 1-100</title>
        <script>
            for(n=1;n<=100;n++){
                c=1
                for(i=2;i<n;i++){
                    if(n%i==0){
                        c=0
                        break
                    }
                }
                if(c==1){       
                    document.write(n+"<br>")
                }
            }
        </script>
    </head>
</html>
