<!DOCTYPE html>
<html>
    <head>
        <title>Loop Statements</title>
        <script>
            document.write("For Loop<hr>")
            for(i=0;i<11;i++){
                document.write(i+"<br>")
            }
            document.write("<br>While Loop<hr>")
            while(i>0){
                document.write(i+"<br>")
                i--
            }
            document.write("<br>Do-While Loop<hr>")
            do{
                document.write(i+"<br>")
                i++
            }
            while(i>10);
        </script>
    </head>
</html>
