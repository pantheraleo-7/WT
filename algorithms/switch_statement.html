<!DOCTYPE html>
<html>
    <head>
        <title>Switch Statement</title>
    </head>
    <body>
        <button type="button" onclick="check()">Check</button>
        <script>
            function check(){
                alphabet = prompt("Enter an alphabet:")
                switch(alphabet){
                    case "A":
                    case "a":
                    case "E":
                    case "e":
                    case "I":
                    case "i":
                    case "O":
                    case "o":
                    case "U":
                    case "u":
                        alert(alphabet+" is a vowel")
                        break
                    default:
                        alert(alphabet+" is a consonant")
                }
            }
        </script>
    </body>
</html>
