<!DOCTYPE html>
<html>
    <head>
        <title>User Registration Form</title>
        <link href="style.css" rel="stylesheet">
    </head>
    <body>
        <form onsubmit="return subm()">
            <input type="text" id="nm" placeholder="Firstname Lastname" oninput="valname(this)"><br><br>
            <label><input type="radio" name="r" id="r1" value="male" onchange="valgen(this)">Male</label><br>
            <label><input type="radio" name="r" id="r2" value="female" onchange="valgen(this)">Female</label><br><br>
            <input type="email" id="ml" placeholder="Email ID" oninput="valmail(this)"><br><br>
            <input type="text" id="num" inputmode="tel" placeholder="Mobile Number" oninput="valnum(this)"><br><br>
            <input type="text" id="usn" placeholder="Username" oninput="valusn(this)"><br><br>
            <input type="password" id="pass1" placeholder="Password" oninput="valpass1(this)" style="margin-left: -2%;">
            <input type="checkbox" onclick="vis(this)" style="margin-left: -7.5%;"><br><br>
            <input type="password" id="pass2" placeholder="Confirm Password" oninput="valpass2(this)"><br><br>
            <button type="submit">Register</button>
        </form><br><br>
        <div id="result" style="color: beige;"><br><br></div>
        <script src="script.js"></script>
    </body>
</html>
