<!DOCTYPE html>
<html>
    <head>
        <title>Inline CSS</title>
    </head>
    <body>
        <h1 style="font-style: italic; color: #800000; text-decoration: overline underline dashed 5px;">This is a heading</h1>
        <p style="font-size: 300%; color: #00ffcc; text-decoration: overline wavy #3333ff 3px; background-color: #3333ff; display: inline-block;">This is a paragraph</p>
    </body>
</html>
