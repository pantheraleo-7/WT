<!DOCTYPE html>
<html>
    <head>
        <title>Class & ID Selectors</title>
        <style>
            .Chead {
                font-family: brush script mt;
                color: #006600;
            }
            #Ihead {
                font-family: copperplate gothic;
                color: #3366cc;
            }
        </style>
    </head>
    <body>
        <h1 class="Chead">This is a heading with a class</h1>
        <h1 id="Ihead">This is a heading with an id</h1>
        <h1 class="Chead">This is a heading with a class</h1>
        <h1>This is a heading</h1>
    </body>
</html>
