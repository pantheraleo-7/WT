<!DOCTYPE html>
<html>
    <head>
        <title>Styling Lists</title>
        <style>
            ul {
                list-style-type: square;
                font-family: edwardian script itc;
                font-size: 200%;
                color: #8b0000;
                background-color: #ff6666;
                padding: 20px;
            }
            ul li {
                background-color: #ffe5e5;
                margin-left: 65px;
            }
            ol {
                list-style-type: lower-greek;
                font-family: copperplate gothic;
                font-size: 150%;
                color: #00008b;
                background-color: #3399ff;
                padding: 20px;
            }
            ol li {
                background-color: #cce5ff;
                padding: 5px;
                margin: 10px;
            }
        </style>
    </head>
    <body>
        <ul>
            <li>Lotus</li>
            <li>Rose</li>
            <li>Jasmine</li>           
        </ul>
        <ol>
            <li>Lion</li>
            <li>Tiger</li>
            <li>Cheetah</li>
        </ol>
    </body>
</html>
