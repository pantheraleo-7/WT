<!DOCTYPE html>
<html>
    <head>
        <title>Formatting Paragraphs</title>
        <style>
            p {
                font-family: castellar;
                font-size: 250%;
                text-align: justify;
                text-indent: 100px;
                line-height: 2;
                border: 15px ridge #ff0000;
                padding: 40px;
                margin: 30px;
            }
        </style>
    </head>
    <body>
        <p>
            This is some text in a paragraph. This is also some text in a paragraph.
            This is definitely some text in a paragraph. This is clearly some text in a paragraph.           
        </p>
    </body>
</html>
