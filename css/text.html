<!DOCTYPE html>
<html>
    <head>
        <title>Formatting Text</title>
        <style>
            .format {
                font-family: edwardian script itc;
                font-size: 150px;
                font-style: italic;
                font-weight: bold;
                color: #000066;
                text-decoration: underline dashed;
                letter-spacing: 5px;
                word-spacing: 10px;
            }
        </style>
    </head>
    <body>
        <span class="format">
            This is a formatted text
        </span>
    </body>
</html>
