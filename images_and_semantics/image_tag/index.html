<!DOCTYPE html>
<html>
    <head>
        <title>Image Tag</title>
    </head>
    <body>
        <h2>A web page can have one or more images. In HTML5, Image tag is used for image insertion</h2>
        <h3>Width & Height attributes define the dimensions of the image</h3>
        <h3>Alt attribute shows a text alternative for the image. While Src is used to provide image URL</h3>
        <img src="html5.png" alt="HTML5" width="250" height="250">
        <img src="imgtags.png" alt="Image Tags" width="285" height="175">
        <img src="webdev.png" alt="Web Devlopment" width="250" height="250"><br>
    </body>
</html>
