<!DOCTYPE html>
<html>
    <head>
        <title>Designing WebPage - Division Tag</title>
        <style>
            *{
                color: #ffffff;
                font-size: 115%;
                text-align: center;
                border-radius: 15px;
            }
            .header{
                background-color: #808080;
                height: 60px;
            }
            .container{
                height: 450px;
            }
            .main{
                background-color: #0000ff;
                width: 75%;
                height: 100%;
                display: inline-block;
            }
            .sub{
                background-color: #3399ff;
                width: 90%;
                height: 70%;
                display: inline-block;
                position: relative;
                top: 10%;
            }
            .aside{
                background-color: #00cc99;
                width: 25%;
                height: 100%;
                float: right; 
            }
            .footer{
                background-color: #000000;
                height: 60px;
            }
        </style>
    </head>
    <body>
        <div class="header">
            This is the Header of the document
        </div>
        <div class="container">
            <div class="main">
                This is the Main content of the document
                <div class="sub">
                    This is an independent content 
                </div>
            </div>
            <div class="aside">
                This content is placed Aside
            </div>
        </div>
        <div class="footer">
            This is the Footer of the document
        </div>
    </body>
</html>
