<!DOCTYPE html>
<html>
    <head>
        <title>Table - BorderColor & Background</title>
    </head>
    <body>
        <table border="7" bordercolor="lightblue" background="parch.jpg">
            <caption><b>State and Capital City</b></caption>
            <tr style="color:blue;">
                <th>State</th>
                <th>City</th>
            </tr>
            <tr>
                <td>India</td>
                <td>Delhi</td>
            </tr>
            <tr>
                <td>Uttar Pradesh</td>
                <td style="color:red;">Lucknow</td>
            </tr>
        </table>
    </body>
</html>
