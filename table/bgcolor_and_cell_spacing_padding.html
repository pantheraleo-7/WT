<!DOCTYPE html>
<html>
    <head>
        <title>Table - Cell: Spacing, Padding & BGColor</title>
    </head>
    <body>
        <table border="20" cellspacing="20" cellpadding="20">
            <caption>State and Capital City</caption>
            <tr bgcolor="yellow">
                <th>State</th>
                <th>City</th>
            </tr>
            <tr>
                <td bgcolor="lightblue">Maharashtra</td>
                <td>Mumbai</td>
            </tr>
            <tr>
                <td>Karnataka</td>
                <td bgcolor="lightgreen">Bangalore</td>
            </tr>
        </table>
    </body>
</html>
