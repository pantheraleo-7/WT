<!doctype html>
<html>
    <head>
        <title>Math Object</title>
        <script>
            document.write("Square root of 9 = "+Math.sqrt(9)+"<br>")
            document.write("3 to the power of 2 = "+Math.pow(3,2)+"<br>")
            document.write("Sin(1) = "+Math.sin(1)+"<br>")
            document.write("Cos(1) = "+Math.cos(1)+"<br>")
            document.write("Tan(1) = "+Math.tan(1)+"<br>")
            document.write("Absolute value of -1 = "+Math.abs(-1)+"<br>")
            document.write("Ceiling of 1.256 = "+Math.ceil(1.256)+"<br>")
            document.write("Floor of 1.256 = "+Math.floor(1.256)+"<br>")
            document.write("Round of 1.3 = "+Math.round(1.3)+"<br>")
            document.write("Round of 2.9 = "+Math.round(2.9)+"<br>")
            document.write("Random number between 0 and 1 = "+Math.random()+"<br>")
            document.write("Euler's number to the power of 3 = "+Math.exp(3)+"<br>")
            document.write("Ln(1.23) = "+Math.log(1.23)+"<br>")
            document.write("Maximum value = "+Math.max(10,12,35)+"<br>")
            document.write("Minimum value = "+Math.min(10,12,35)+"<br>")
        </script>
    </head>
</html>
