<!doctype html>
<html>
    <head>
        <title>Number Object</title>
        <script>
            document.write("Maximum value: "+Number.MAX_VALUE+"<br>")
            document.write("Minimum value: "+Number.MIN_VALUE+"<br>")
            document.write("Not a Number value: "+Number.NaN+"<br>")
            document.write("Positive infinity: "+Number.POSITIVE_INFINITY+"<br>")
            document.write("Negative infinty: "+Number.NEGATIVE_INFINITY+"<br>")
            document.write("isFinite(-Infinity): "+Number.isFinite(-Infinity)+"<br>")
            document.write("isInteger(12.34): "+Number.isInteger(12.34)+"<br>")
            document.write("isNaN(0/0): "+Number.isNaN(0/0)+"<br>")
        </script>
    </head>
</html>
