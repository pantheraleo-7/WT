<!DOCTYPE html>
<html>
    <head>
        <title>Boolean Object</title>
        <script>
            document.write("Boolean(0) is "+new Boolean(0)+"<br>")
            document.write("Boolean(null) is "+new Boolean(null)+"<br>")
            document.write("Boolean(NaN) is "+new Boolean(NaN)+"<br>")
            document.write("Boolean(undefined) is "+new Boolean(undefined)+"<br>")
            document.write("Boolean(false) is "+new Boolean(false)+"<br>")
            document.write('Boolean("") is '+new Boolean("")+"<br>")
            document.write("Boolean(Boolean) is "+new Boolean(new Boolean)+"<br>")
            document.write("Boolean(45) is "+new Boolean(45))
        </script>
    </head>
</html>
