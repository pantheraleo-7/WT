<!doctype html>
<html>
    <head>
        <title>String Object</title>
        <script>
            str1 = new String("Java")
            str2 = "Script"
            document.write("String1: "+str1+"<br>")
            document.write("String2: "+str2+"<br>")
            document.write("Length of string1: "+str1.length+"<br>")
            document.write("Character at index 0: "+str1.charAt(0)+"<br>")
            document.write("Character at index 3: "+str1.charAt(3)+"<br>")
            document.write("Concatenation: "+str1.concat(str2)+"<br>")
            document.write("Uppercase of string1: "+str1.toUpperCase()+"<br>")
            document.write("Lowercase of string2: "+str2.toLowerCase()+"<br>")
            document.write('First index of "a" in string1: '+str1.indexOf("a")+"<br>")
            document.write('Last index of "a" in string1: '+str1.lastIndexOf("a")+"<br>")
            document.write("Substring of string1: "+str1.substr(1,2)+"<br>")
            document.write("Substring of string2: "+str2.substr(2,4)+"<br>")
            document.write("Slice of string1: "+str1.slice(1)+"<br>")
            document.write("Slice of string2: "+str2.slice(2)+"<br>")
            document.write("Splitting string1: "+str1.split(""))
        </script>
    </head>
</html>
